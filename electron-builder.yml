appId: com.family.medexpirykeeper
productName: 家庭药品效期管家
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
extraMetadata:
  main: dist/main/main.js
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
